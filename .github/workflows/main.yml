name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकOUT करना
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Node.js सेट करना
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3. Java (JDK 21) सेट करना (यहाँ बदलाव किया गया है 17 से 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # 4. Capacitor और ज़रूरी टूल्स इंस्टॉल करना
    - name: Install Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "My App" "com.example.myapp" --web-dir=www

    # 5. index.html को www फोल्डर में डालना
    - name: Prepare Web Assets
      run: |
        mkdir www
        cp index.html www/

    # 6. Android प्रोजेक्ट क्रिएट करना और सिंक करना
    - name: Add Android Platform
      run: |
        npx cap add android
        npx cap sync android

    # 7. Gradle की मदद से असली APK बिल्ड करना
    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # 8. तैयार हुई APK को GitHub पर अपलोड करना
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
