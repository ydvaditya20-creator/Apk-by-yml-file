<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Button with Iframe</title>
    <style>
        /* Shuruat mein iframe ko chhipane ke liye */
        #myIframe {
            display: none;
            width: 100%;
            height: 90vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Yeh sab gayab ho jayega click karne par -->
    <div id="main-content">
        <h1>Welcome to My Project</h1>
        <p>Iframe open karne ke liye neeche diye gaye button par click karein.</p>
        <button id="startBtn">Start</button>
    </div>

    <!-- Yeh iframe shuru mein hidden rahega -->
    <iframe id="myIframe" src="https://ydvaditya20-creator.github.io/Apk-by-yml-file/"></iframe>

    <script>
        // Button aur content ko select karna
        const startBtn = document.getElementById('startBtn');
        const mainContent = document.getElementById('main-content');
        const myIframe = document.getElementById('myIframe');

        // Button click hone par kya hoga
        startBtn.addEventListener('click', function() {
            mainContent.style.display = 'none'; // Baaki sab hata diya
            myIframe.style.display = 'block';   // Iframe ko dikha diya
        });
    </script>

</body>
</html>
