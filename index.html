<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Salary Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#fff;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    display:none;
}

#error-screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    text-align:center;
    z-index:999;
    padding:20px;
}

.error-box{
    max-width:350px;
}

.error-box h2{
    color:#d32f2f;
    margin-bottom:12px;
    font-size:22px;
}

.error-box p{
    color:#555;
    margin-bottom:20px;
    font-size:16px;
    line-height:1.5;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:6px;
    background:#1976d2;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

#loading{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    font-size:18px;
    z-index:998;
}
</style>

</head>
<body>

<div id="loading">
    कृपया प्रतीक्षा करें...
</div>

<div id="error-screen" style="display:none;">
    <div class="error-box">
        <h2>⚠️ इंटरनेट उपलब्ध नहीं है</h2>
        <p>कृपया मोबाइल डेटा या Wi-Fi चालू करें।</p>
        <button onclick="checkInternetAndLoad()">फिर से कोशिश करें</button>
    </div>
</div>

<iframe
id="web-view"
allow="fullscreen"
loading="eager">
</iframe>

<script>

const TARGET_URL="https://ydvaditya20-creator.github.io/LL-salary/";

const iframe=document.getElementById("web-view");
const errorScreen=document.getElementById("error-screen");
const loading=document.getElementById("loading");

let loaded=false;

async function hasInternet(){

    try{

        const controller=new AbortController();

        const timeout=setTimeout(()=>{
            controller.abort();
        },5000);

        await fetch(
            "https://www.google.com/favicon.ico?"+Date.now(),
            {
                mode:"no-cors",
                cache:"no-store",
                signal:controller.signal
            }
        );

        clearTimeout(timeout);

        return true;

    }catch(e){

        return false;

    }

}

async function checkInternetAndLoad(){

    loading.style.display="flex";
    errorScreen.style.display="none";

    const online=await hasInternet();

    if(online){

        if(!loaded){

            iframe.onload=function(){

                loading.style.display="none";
                errorScreen.style.display="none";
                iframe.style.display="block";

            };

            iframe.src=TARGET_URL;
            loaded=true;

        }else{

            loading.style.display="none";
            iframe.style.display="block";

        }

    }else{

        loading.style.display="none";
        iframe.style.display="none";
        errorScreen.style.display="flex";

    }

}

window.onload=function(){

    setTimeout(checkInternetAndLoad,1500);

};

window.addEventListener("online",checkInternetAndLoad);
window.addEventListener("offline",checkInternetAndLoad);

setInterval(checkInternetAndLoad,5000);

</script>

</body>
</html>
