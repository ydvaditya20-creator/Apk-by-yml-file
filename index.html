<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login Portal (CSV)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; border: none; color: white; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #error-msg { color: red; text-align: center; margin-top: 10px; font-weight: bold; }
        #data-container { display: none; margin-top: 20px; border-top: 2px solid #28a745; padding-top: 15px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .data-label { font-weight: bold; color: #666; }
        .data-value { color: #111; }
        .loader { display: none; text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <!-- लॉगिन बॉक्स -->
    <div id="login-box">
        <h2>सदस्य लॉगिन (CSV Mode)</h2>
        <div class="form-group">
            <label for="memberCode">अपना मेम्बर कोड दर्ज करें:</label>
            <input type="text" id="memberCode" placeholder="जैसे: MEM101" required>
        </div>
        <button onclick="checkMember()">डेटा खोजें</button>
        <div id="loader" class="loader">शीट लोड हो रही है, कृपया रुकें...</div>
        <div id="error-msg"></div>
    </div>

    <!-- डेटा डिस्प्ले बॉक्स -->
    <div id="data-container">
        <h2>आपका विवरण (Your Details)</h2>
        <div id="details-list"></div>
        <button onclick="logout()" style="background-color: #6c757d; margin-top: 15px;">वापस जाएँ</button>
    </div>
</div>

<script>
    // यहाँ अपनी Published CSV का URL पेस्ट करें
    const CSV_URL = "YOUR_PUBLISHED_CSV_URL_HERE";

    // CSV को एरे (Rows & Columns) में बदलने का फंक्शन
    function parseCSV(text) {
        let lines = text.split('\n');
        return lines.map(line => {
            // बेसिक CSV स्प्लिट (कोमा के आधार पर)
            return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(val => val.replace(/^"|"$/g, '').trim());
        });
    }

    async function checkMember() {
        const memberCodeInput = document.getElementById('memberCode').value.trim();
        const errorMsg = document.getElementById('error-msg');
        const loader = document.getElementById('loader');
        const dataContainer = document.getElementById('data-container');
        const detailsList = document.getElementById('details-list');

        errorMsg.innerText = "";
        detailsList.innerHTML = "";

        if (!memberCodeInput) {
            errorMsg.innerText = "कृपया मेम्बर कोड डालें!";
            return;
        }

        loader.style.display = "block";

        try {
            // सीधे गूगल शीट से CSV डाउनलोड करना
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            const rows = parseCSV(csvText);

            loader.style.display = "none";

            // Row 3 हेडर है (JavaScript इंडेक्स 2 होगा क्योंकि काउंटिंग 0 से शुरू होती है)
            const headers = rows[2]; 
            
            if (!headers) {
                errorMsg.innerText = "शीट का हेडर फॉर्मेट सही नहीं है।";
                return;
            }

            let memberFound = false;

            // Row 4 से डेटा शुरू है (इंडेक्स 3 से लूप शुरू करेंगे)
            for (let i = 3; i < rows.length; i++) {
                let currentRow = rows[i];
                
                // Column C मेम्बर कोड है (इंडेक्स 2 होगा: A=0, B=1, C=2)
                if (currentRow && currentRow[2] === memberCodeInput) {
                    memberFound = true;
                    
                    document.getElementById('login-box').style.display = "none";
                    dataContainer.style.display = "block";

                    // सारे कॉलम्स को स्क्रीन पर दिखाना
                    headers.forEach((header, index) => {
                        if (header && header.trim() !== "") {
                            const value = currentRow[index] || "-";
                            const rowDiv = document.createElement('div');
                            rowDiv.className = 'data-row';
                            rowDiv.innerHTML = `<span class="data-label">${header}:</span> <span class="data-value">${value}</span>`;
                            detailsList.appendChild(rowDiv);
                        }
                    });
                    break; 
                }
            }

            if (!memberFound) {
                errorMsg.innerText = "गलत मेम्बर कोड! कोई रिकॉर्ड नहीं मिला।";
            }

        } catch (error) {
            loader.style.display = "none";
            errorMsg.innerText = "डेटा लोड करने में समस्या आई। कृपया इंटरनेट चेक करें।";
            console.error(error);
        }
    }

    function logout() {
        document.getElementById('data-container').style.display = "none";
        document.getElementById('login-box').style.display = "block";
        document.getElementById('memberCode').value = "";
    }
</script>

</body>
</html>
